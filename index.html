<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jishnu K | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
</head>
<body>

     <!-- ADD side-nav OUTSIDE .wrapper, before it -->


  <div class="wrapper">
    <nav>
      <a href="#home"div class="logo">J<span style="color: rgba(255, 99, 71, 0.837);">K</span></a>
      <div class="menu-btn" id="menu-btn">☰</div>

        <div class="side-nav">
            
            <a href="#home"     class="side-nav-item active" data-label="Home">
            <div class="side-nav-circle"><i class="fa-solid fa-house"></i></div>
            <span class="side-nav-label">Home</span>
            </a>
            <a href="#about"    class="side-nav-item" data-label="About">
            <div class="side-nav-circle"><i class="fa-solid fa-user"></i></div>
            <span class="side-nav-label">About</span>
            </a>
            <a href="#skills"   class="side-nav-item" data-label="Skills">
            <div class="side-nav-circle"><i class="fa-solid fa-bolt"></i></div>
            <span class="side-nav-label">Skills</span>
            </a>
            <a href="#projects" class="side-nav-item" data-label="Projects">
            <div class="side-nav-circle"><i class="fa-solid fa-diagram-project"></i></div>
            <span class="side-nav-label">Projects</span>
            </a>
            <a href="#contact"  class="side-nav-item" data-label="Contact">
            <div class="side-nav-circle"><i class="fa-solid fa-envelope"></i></div>
            <span class="side-nav-label">Contact</span>
            </a>
        </div>
      
    </nav>

        <section class="hero" id="home">
            <div>
                <h1 id="hero-name">Loading...</h1>
                <p id="hero-desc"></p>
                <div class="stats">
                    <a href="#projects" class="stat"><h2 id="stat-projects">0 <span>Projects</span></h2></a>
                    <a href="#skills" class="stat"><h2 id="stat-skills">0 <span>Skills</span></h2></a>
                    <a href="#contact" class="stat arrow"><h2>Get <span>in touch</span> →</h2></a>
                </div>
            </div>
            <img id="hero-image" alt="Hero Image">
        </section>


        
        <h2>About Me</h2>
        <section class="about-split" id="about">
            <div class="about-text">
                <h2 id="about-title"></h2>
                <p id="about-text"></p>
            </div>
            <div class="about-image">
                <img id="about-pic" alt="About Me Picture">
            </div>
        </section>

        <section class="skills-exp" id="skills">
            <div class="skills">
                <h2>Skills</h2>
                <div class="skill-grid" id="skill-container"></div>
            </div>
            <div class="experience" id="exp-container">
                <h2>Experience</h2>
            </div>
        </section>



        <h2>Projects</h2>
        <section class="projects" id="projects">
            <div class="project-list" id="project-container"></div>
            <div>
                <div class="project-image">
                    <img id="preview" alt="Project Preview">
                </div>
                <div class="progress"><span id="bar"></span></div>
            </div>
        </section>
            
        

        <section class="contact" id="contact">
            <h2>Contact</h2>
            <p class="subtitle">Curious about something or want to team up? Say hi!</p>
            
            <div class="contact-actions">
                <a id="email-btn" href="#" class="btn-outline">Email Me</a>
                <a id="resume-btn" href="#" class="btn-outline">Peek at My Resume</a>
            </div>

            <div class="socials" id="social-container"></div>

            <footer class="footer-v2">
                © 2025 <span id="footer-name">Jishnu</span>. All rights reserved.
            </footer>
        </section>
    </div>

    <script src="script.js"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    


</body>
</html>
